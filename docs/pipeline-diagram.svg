<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">WP5 Conversation Pipeline</title>
  <desc id="desc">Concrete diagram of the conversation pipeline, from session start and news popup to agent selection and the Director control loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#edf2f7"/>
    </linearGradient>
    <linearGradient id="header" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#123c69"/>
      <stop offset="100%" stop-color="#1d6f8b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4a5568"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', sans-serif; fill: #ffffff; }
      .subtitle { font: 400 16px 'Segoe UI', sans-serif; fill: #dbeafe; }
      .h1 { font: 700 22px 'Segoe UI', sans-serif; fill: #0f172a; }
      .h2 { font: 700 18px 'Segoe UI', sans-serif; fill: #0f172a; }
      .body { font: 400 15px 'Segoe UI', sans-serif; fill: #334155; }
      .small { font: 600 13px 'Segoe UI', sans-serif; fill: #475569; }
      .mono { font: 700 11px 'Consolas', monospace; fill: #0f172a; }
      .box { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; rx: 18; }
      .blue { fill: #e8f1ff; stroke: #8db5e3; stroke-width: 2; rx: 18; }
      .green { fill: #ebfaf2; stroke: #78c6a3; stroke-width: 2; rx: 18; }
      .amber { fill: #fff6e8; stroke: #efbf75; stroke-width: 2; rx: 18; }
      .violet { fill: #f4efff; stroke: #b9a3e9; stroke-width: 2; rx: 18; }
      .line { stroke: #4a5568; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #0f766e; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 9 7; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1120" fill="url(#bg)"/>
  <rect x="36" y="28" width="1528" height="102" rx="24" fill="url(#header)"/>
  <text x="72" y="76" class="title">WP5 Conversation Pipeline</text>
  <text x="72" y="106" class="subtitle">What happens from participant entry to agent turn control and feedback</text>

  <rect x="60" y="170" width="260" height="138" class="blue"/>
  <text x="84" y="206" class="h2">1. Participant Enters</text>
  <text x="84" y="234" class="body">Participant writes token</text>
  <text x="84" y="258" class="body">and optional display name.</text>
  <text x="84" y="290" class="mono">POST /session/start</text>

  <rect x="360" y="170" width="260" height="138" class="blue"/>
  <text x="384" y="206" class="h2">2. Session Boot</text>
  <text x="384" y="234" class="body">Backend creates session,</text>
  <text x="384" y="258" class="body">loads treatment and seeds</text>
  <text x="384" y="282" class="body">the news article.</text>

  <rect x="660" y="170" width="260" height="138" class="amber"/>
  <text x="684" y="206" class="h2">3. News Pop-up</text>
  <text x="684" y="234" class="body">Participant reads the</text>
  <text x="684" y="258" class="body">article before chatting.</text>
  <text x="684" y="282" class="body">Chat is still blocked here.</text>

  <rect x="960" y="170" width="260" height="138" class="amber"/>
  <text x="984" y="206" class="h2">4. Self-report</text>
  <text x="984" y="234" class="body">Participant chooses:</text>
  <text x="984" y="258" class="body">In favor / Against</text>
  <text x="984" y="282" class="body">/ Skeptical</text>
  <text x="984" y="306" class="mono">POST /session/{id}/</text>
  <text x="984" y="326" class="mono">participant-stance</text>

  <rect x="1260" y="170" width="280" height="138" class="green"/>
  <text x="1284" y="206" class="h2">5. Hint Stored</text>
  <text x="1284" y="234" class="body">The answer is saved as a</text>
  <text x="1284" y="258" class="body">soft prior for the session.</text>
  <text x="1284" y="282" class="body">It does not replace</text>
  <text x="1284" y="306" class="body">classifier inference.</text>

  <path d="M320 238 L360 238" class="line"/>
  <path d="M620 238 L660 238" class="line"/>
  <path d="M920 238 L960 238" class="line"/>
  <path d="M1220 238 L1260 238" class="line"/>

  <rect x="60" y="360" width="710" height="220" class="violet"/>
  <text x="88" y="402" class="h1">6. Mode Split</text>
  <text x="88" y="432" class="body">The pipeline now branches depending on the</text>
  <text x="88" y="456" class="body">selected mode: prompt-based or agent-based.</text>

  <rect x="92" y="466" width="300" height="84" class="box"/>
  <text x="116" y="498" class="small">Prompt-based</text>
  <text x="116" y="522" class="body">Keep the configured agents.</text>
  <text x="116" y="544" class="body">Self-report only helps the Director.</text>

  <rect x="430" y="466" width="308" height="84" class="box"/>
  <text x="454" y="498" class="small">Agent-based</text>
  <text x="454" y="522" class="body">Recompose the roster from the agent pool.</text>
  <text x="454" y="544" class="body">Self-report helps choose better bots.</text>

  <rect x="830" y="360" width="710" height="220" class="green"/>
  <text x="858" y="402" class="h1">7. Agent-based Selection Logic</text>
  <text x="858" y="432" class="body">Used only when the experiment runs in agent-based mode.</text>

  <rect x="860" y="468" width="190" height="86" class="box"/>
  <text x="884" y="500" class="small">Input A</text>
  <text x="884" y="524" class="body">agent_pool</text>
  <text x="884" y="546" class="body">pool_agent_ids</text>

  <rect x="1080" y="468" width="190" height="86" class="box"/>
  <text x="1104" y="500" class="small">Input B</text>
  <text x="1104" y="524" class="body">LIKEMINDED_TARGET</text>
  <text x="1104" y="546" class="body">INCIVILITY_TARGET</text>

  <rect x="1300" y="468" width="210" height="86" class="box"/>
  <text x="1324" y="500" class="small">Input C</text>
  <text x="1324" y="524" class="body">self-report hint</text>
  <text x="1324" y="546" class="body">num_agents</text>

  <text x="860" y="602" class="body">The selector ranks candidates by stance,</text>
  <text x="860" y="626" class="body">ideology and incivility, then builds the final roster.</text>

  <path d="M1410 308 L1410 360" class="line"/>

  <rect x="60" y="628" width="1480" height="360" class="box"/>
  <text x="92" y="672" class="h1">8. Turn Control Loop</text>
  <text x="92" y="702" class="body">Once the roster is ready, the same turn pipeline runs in both modes.</text>

  <rect x="110" y="770" width="220" height="152" class="blue"/>
  <text x="136" y="808" class="h2">Director Evaluate</text>
  <text x="136" y="836" class="body">Checks treatment progress,</text>
  <text x="136" y="860" class="body">ecological validity and</text>
  <text x="136" y="884" class="body">what should change next.</text>

  <rect x="390" y="770" width="220" height="152" class="blue"/>
  <text x="416" y="808" class="h2">Director Action</text>
  <text x="416" y="836" class="body">Chooses who acts,</text>
  <text x="416" y="860" class="body">what action type to use,</text>
  <text x="416" y="884" class="body">and the instruction.</text>

  <rect x="670" y="770" width="220" height="152" class="green"/>
  <text x="696" y="808" class="h2">Performer</text>
  <text x="696" y="836" class="body">Writes the actual message</text>
  <text x="696" y="860" class="body">from the chosen agent's</text>
  <text x="696" y="884" class="body">persona and stance.</text>

  <rect x="950" y="770" width="220" height="152" class="amber"/>
  <text x="976" y="808" class="h2">Moderator</text>
  <text x="976" y="836" class="body">Extracts a clean</text>
  <text x="976" y="860" class="body">publishable message</text>
  <text x="976" y="884" class="body">for the chatroom.</text>

  <rect x="1230" y="770" width="250" height="152" class="violet"/>
  <text x="1256" y="808" class="h2">Classifier</text>
  <text x="1256" y="836" class="body">Returns:</text>
  <text x="1256" y="860" class="body">is_incivil</text>
  <text x="1256" y="884" class="body">is_like_minded</text>
  <text x="1256" y="908" class="body">inferred stance</text>
  <text x="1256" y="932" class="body">+ confidence</text>

  <path d="M330 846 L390 846" class="line"/>
  <path d="M610 846 L670 846" class="line"/>
  <path d="M890 846 L950 846" class="line"/>
  <path d="M1170 846 L1230 846" class="line"/>

  <path d="M1355 944 C1355 1010, 220 1010, 220 924" class="loop"/>
  <text x="585" y="1038" class="small">Classifier output feeds back into</text>
  <text x="585" y="1058" class="small">the next Director cycle</text>

  <text x="60" y="1080" class="body">Key rule: self-report improves the starting point,</text>
  <text x="60" y="1102" class="body">but treatment control still depends on the Director plus classifier feedback.</text>
</svg>
